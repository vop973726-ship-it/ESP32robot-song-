name: ci

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Lint server
        run: npm run check:server

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build robot firmware
        run: npm run check:firmware:robot

      - name: Build camera firmware
        run: npm run check:firmware:camera
